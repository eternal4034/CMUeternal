# ---- Bone-setting steps ----------------------------------------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepSetSimpleBone
  name: Realign simple fracture
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMBoneSetter
    remove:
    - type: Fracture
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Simple
    downgradeTo: None
    integrityRestore: 70
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepRealignCompoundBone
  name: Realign compound fracture
  components:
  - type: CMSurgeryStep
    skill: 3
    tool:
    - type: CMBoneSetter
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Compound
    downgradeTo: Simple
    integrityRestore: 40
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepApplyBoneGel
  name: Apply bone gel
  components:
  - type: CMSurgeryStep
    skill: 3
    tool:
    - type: CMBoneGel
    remove:
    - type: Fracture
  - type: CMUFracturedSurgeryCondition
    requireAtLeast: Simple
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Simple
    downgradeTo: None
    integrityRestore: 60
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepRealignComminutedBone
  name: Realign comminuted fracture
  components:
  - type: CMSurgeryStep
    skill: 4
    tool:
    - type: CMBoneSetter
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Comminuted
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Comminuted
    downgradeTo: Compound
    integrityRestore: 25
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepInsertBoneGraft
  name: Insert bone graft
  components:
  - type: CMSurgeryStep
    skill: 4
    tool:
    - type: CMUBoneGraft
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Compound
    downgradeTo: Simple
    integrityRestore: 40
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

# ---- Internal-bleed clamp step ---------------------------------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepCauterizeBleed
  name: Clamp internal bleed
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMHemostat
    remove:
    - type: InternalBleeding
  - type: CMUInternalBleedingSurgeryCondition
  - type: CMUSurgeryStepCauterizeBleedEffect
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat

# ---- Organ removal: clamp / sever / extract per slot -----------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepClampLiverVessels
  name: Clamp liver vessels
  components:
  - type: CMSurgeryStep
    skill: 3
    tool:
    - type: CMUOrganClamp
