- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepExtractLiver
  name: Extract liver
  components:
  - type: CMSurgeryStep
    skill: 3
    tool:
    - type: CMHemostat
    add:
    - type: CMULiverRemovedMarker
  - type: CMUOrganDamagedSurgeryCondition
    organSlot: liver
    minStage: Healthy   # extraction is valid even on healthy organs (donor harvesting)
  - type: CMUSurgeryStepRemoveOrganEffect
    organSlot: liver
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat

- type: entity
