# ---- Limb reattachment -----------------------------------------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepRemoveStump
  name: Trim necrotic stump
  components:
  - type: CMSurgeryStep
    skill: 3
    tool:
    - type: CMBoneSaw
    add:
    - type: CMUStumpRemoved
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
    state: saw

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepPrepReattachSocket
  name: Prep reattachment socket
  components:
  - type: CMSurgeryStep
    skill: 3
    tool:
    - type: CMHemostat
    add:
    - type: CMUReattachPrepped
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepReattachLimb
  name: Reattach severed limb
  components:
  - type: CMSurgeryStep
    skill: 3
    add:
    - type: CMUReattachComplete
  - type: CMUSurgeryStepReattachLimbEffect
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepCloseReattach
  name: Close incision
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMCautery
    remove:
    - type: CMSkinRetracted
    - type: CMBleedersClamped
    - type: CMIncisionOpen
    - type: CMUStumpRemoved
    - type: CMUReattachPrepped
    - type: CMUReattachComplete
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/cautery.rsi
    state: cautery
  - type: CMSurgeryStepEmoteEffect

