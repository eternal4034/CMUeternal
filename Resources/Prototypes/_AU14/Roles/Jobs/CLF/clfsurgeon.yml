- type: job
  parent: CMJobBase
  id: AU14JobCLFSurgeon
  name: au14-job-name-clfsurgeon
  description: au14-job-description-clfsurgeon
  setPreference: true
  ignoreAllegiance: true
  playTimeTracker: AU14JobCLFSurgeon
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 14400 # 4 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - NonResuscitable
    - Epilepsy
  ranks:
    RMCRankCivilian: []
  startingGear: AU14GearCLFSurgeon
  icon: "CMJobIconEmpty"
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-clflrs
  accessGroups:
  - Colonist
  - aumed
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - CLF
    - type: CLFMember
    - type: Skills
      skills:
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillDomestics: 1
        RMCSkillMedical: 3
        RMCSkillResearch: 1
        RMCSkillSurgery: 3
        RMCSkillFirearms: 2
        RMCSkillPolice: 1
    - type: JobPrefix
      prefix: au14-job-prefix-clfsurgeon
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: ShowMarineIcons
      factions:
      - CLF
  hidden: false

- type: startingGear
  id: AU14GearCLFSurgeon
  equipment:
    back: CMBackpackMedical
    gloves: CMHandsLatex
    jumpsuit: AU14RMCJumpsuitCivilianCLF
    outerClothing: RMCLabcoatOpened
    shoes: CMBootsBlackFilled
    ears2: RMCFlashlightPen
    suitstorage: RMCFlashlight
    id: AU14IDCardCLFSurgeon
    neck: RMCCLFArmband

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointCLFSurgeon
  name: Spawn Point CLF Surgeon
  components:
  - type: SpawnPoint
    job_id: AU14JobCLFSurgeon
  - type: Sprite
    state: syn_spawn

- type: playTimeTracker
  id: AU14JobCLFSurgeon
  isHumanoid: true
